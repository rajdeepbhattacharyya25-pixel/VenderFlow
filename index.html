<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#047857" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VendorFlow" />
  <meta name="description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta name="keywords"
    content="vendorflow, e-commerce, india, online shopping, platform, dashboard, merchant, seller" />
  <meta name="robots" content="index, follow, max-image-preview:large" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="VendorFlow — Shop Smart" />
  <meta property="og:description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta property="og:url" content="https://vendorflow.vercel.app" />
  <meta property="og:image" content="https://vendorflow.vercel.app/logo.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="VendorFlow" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VendorFlow — Shop Smart" />
  <meta name="twitter:description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta name="twitter:image" content="https://vendorflow.vercel.app/logo.jpg" />

  <link rel="canonical" href="https://vendorflow.vercel.app/" />
  <title>VenderFlow | Scale Without Compromise</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "url": "https://vendorflow.vercel.app",
      "logo": "https://vendorflow.vercel.app/logo.jpg",
      "name": "VendorFlow",
      "description": "Premium e-commerce marketplace platform for independent stores."
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "VendorFlow",
      "applicationCategory": "BusinessApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "VendorFlow",
      "url": "https://vendorflow.vercel.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://vendorflow.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="apple-touch-icon" href="/logo-maskable.jpg" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
