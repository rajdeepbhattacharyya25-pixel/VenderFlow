<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#047857" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VenderFlow" />
  <meta name="description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta name="keywords"
    content="venderflow, e-commerce, india, online shopping, platform, dashboard, merchant, seller" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="VenderFlow — Shop Smart" />
  <meta property="og:description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta property="og:url" content="https://venderflow.vercel.app" />
  <meta property="og:image" content="https://venderflow.vercel.app/logo.jpg" />
  <meta property="og:site_name" content="VenderFlow" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VenderFlow — Shop Smart" />
  <meta name="twitter:description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta name="twitter:image" content="https://venderflow.vercel.app/logo.jpg" />

  <link rel="canonical" href="https://venderflow.vercel.app/" />
  <title>VenderFlow — Shop Smart</title>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "url": "https://venderflow.vercel.app",
      "logo": "https://venderflow.vercel.app/logo.jpg",
      "name": "VenderFlow",
      "description": "Premium e-commerce marketplace platform for independent stores."
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "VenderFlow",
      "applicationCategory": "BusinessApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="apple-touch-icon" href="/logo-maskable.jpg" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      /* LIGHT THEME DEFAULT (Dashboard) */
      --bg: #F5F7FA;
      --panel: #FFFFFF;
      --muted: #6B7280;
      --text: #111827;

      /* KPI Accents (Pastels for Light Mode) */
      --accent-1: #DFF8FF;
      --accent-2: #F1FFC8;
      --accent-3: #F3E9FF;

      --chart-line: #A7D129;
      --donut-online: #38BDF8;
      --donut-store: #1F2937;
      --shadow: rgba(16, 24, 40, 0.06);
      --border: #E5E7EB;
    }

    html.dark {
      /* DARK THEME OVERRIDES (Dashboard) */
      --bg: #0B0C0E;
      --panel: #151619;
      --muted: #9CA3AF;
      --text: #F9FAFB;

      /* KPI Accents (Rich/Saturated for Dark Mode) */
      --accent-1: #164E63;
      --accent-2: #365314;
      --accent-3: #581C87;

      --chart-line: #D9F99D;
      --donut-online: #38BDF8;
      --donut-store: #334155;
      --shadow: rgba(0, 0, 0, 0.5);
      --border: #2D3B55;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5 {
      font-family: 'Playfair Display', serif;
    }

    .hide-scroll::-webkit-scrollbar {
      display: none;
    }

    .hide-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes zoomFade {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }

      100% {
        opacity: 0;
        transform: scale(1.2);
      }
    }

    .animate-zoom-fade {
      animation: zoomFade 0.6s ease-out forwards;
    }

    /* Smooth Theme Transition */
    /* Smooth Theme Transition moved to index.css to prevent double-paint */

    /* Dashboard Compat Colors via Tailwind config inline */
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
