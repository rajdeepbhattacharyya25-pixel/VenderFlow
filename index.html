<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#047857" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VendorFlow" />
  <meta name="description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta name="keywords"
    content="vendorflow, e-commerce, india, online shopping, platform, dashboard, merchant, seller" />
  <meta name="robots" content="index, follow, max-image-preview:large" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="VendorFlow — Shop Smart" />
  <meta property="og:description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta property="og:url" content="https://vendorflow.vercel.app" />
  <meta property="og:image" content="https://vendorflow.vercel.app/logo.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="VendorFlow" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VendorFlow — Shop Smart" />
  <meta name="twitter:description"
    content="Premium e-commerce marketplace. Shop curated products from verified Indian sellers." />
  <meta name="twitter:image" content="https://vendorflow.vercel.app/logo.jpg" />

  <link rel="canonical" href="https://venderflow.vercel.app/" />
  <title>VenderFlow | Scale Without Compromise</title>
  
  <!-- Preconnect to Font origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Preload fonts to avoid FOUT/FOIT -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@800&family=Playfair+Display:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap">
  
  <!-- High priority Styles -->
  <link rel="stylesheet" href="/index.css">
  
  <!-- Async loading for fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@800&family=Playfair+Display:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <!-- <script src="https://telegram.org/js/telegram-web-app.js" defer></script> -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
