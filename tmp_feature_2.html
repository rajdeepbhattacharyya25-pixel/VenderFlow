<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ccff00",
                        "background-light": "#f8f8f5",
                        "background-dark": "#050505",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Navigation Header -->
<header class="flex items-center justify-between px-6 py-6 z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl">arrow_back_ios</span>
<span class="text-xs font-medium tracking-[0.2em] uppercase text-zinc-500">Back</span>
</div>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight">VendorFlow</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center p-2 text-slate-100">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Section -->
<main class="flex-1 flex flex-col px-6 justify-center relative">
<!-- Vertical Dot Progress (Right Side) -->
<div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col gap-4 items-center z-10">
<div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary neon-glow"></div>
<div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
<div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
<div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
</div>
<!-- Content Card -->
<div class="glass-card rounded-3xl p-8 flex flex-col gap-6 relative overflow-hidden">
<!-- Decorative element -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="space-y-2">
<span class="text-primary font-bold text-lg tracking-widest font-display">02</span>
<h1 class="text-4xl font-extrabold tracking-tight text-slate-50 leading-tight">Much Lower Commission</h1>
</div>
<p class="text-zinc-400 text-base font-normal leading-relaxed max-w-[85%]">
                    Keep more of what you earn. Transparent pricing without the 15-30% marketplace cut.
                </p>
<!-- Visualization Area -->
<div class="mt-8 relative h-48 w-full flex items-end justify-between px-4 pb-2">
<!-- Savings Grid Representation -->
<div class="absolute inset-0 opacity-10 pointer-events-none">
<div class="w-full h-full" style="background-image: radial-gradient(circle at 1px 1px, #ccff00 1px, transparent 0); background-size: 24px 24px;"></div>
</div>
<div class="flex flex-col items-center gap-3 w-1/3">
<div class="w-full bg-zinc-800/50 border border-zinc-700 rounded-t-lg h-32 relative overflow-hidden">
<div class="absolute bottom-0 w-full bg-zinc-700 h-full"></div>
</div>
<span class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Standard</span>
</div>
<div class="flex flex-col items-center gap-3 w-1/3">
<div class="w-full bg-primary/10 border border-primary/30 rounded-t-lg h-12 relative overflow-hidden">
<div class="absolute bottom-0 w-full bg-primary h-full"></div>
</div>
<span class="text-[10px] uppercase tracking-widest text-primary font-bold">VendorFlow</span>
</div>
<!-- Growth Indicator -->
<div class="absolute top-0 right-0 p-4">
<div class="flex flex-col items-end">
<span class="text-primary text-3xl font-black">-80%</span>
<span class="text-zinc-500 text-[10px] uppercase tracking-tighter">Fee Reduction</span>
</div>
</div>
</div>
<!-- Footer Stats -->
<div class="flex justify-between items-center pt-8 border-t border-zinc-800/50 mt-4">
<div class="flex flex-col">
<span class="text-zinc-500 text-xs font-medium">Avg. Saving</span>
<span class="text-slate-100 text-lg font-bold">$2,450/mo</span>
</div>
<button class="bg-primary text-black font-bold px-6 py-3 rounded-full text-sm hover:opacity-90 transition-opacity">
                        View Rates
                    </button>
</div>
</div>
<!-- Background Aesthetic -->
<div class="fixed bottom-0 left-0 w-full h-1/2 pointer-events-none -z-10 opacity-20">
<div class="w-full h-full bg-gradient-to-t from-primary/20 to-transparent"></div>
</div>
</main>
<!-- Swipe Indicator -->
<footer class="p-8 flex flex-col items-center gap-2 opacity-50">
<span class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] font-medium">Swipe for More</span>
<span class="material-symbols-outlined text-zinc-600">expand_more</span>
</footer>
</div>
</body></html>
